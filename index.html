    <script>
        // Apply theme before CSS paints to avoid light/dark flash on reload.
        (function () {
            try {
                var THEME_KEY = 'steem-theme-preference';
                var savedTheme = localStorage.getItem(THEME_KEY);
                var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = savedTheme || (systemDark ? 'dark' : 'light');

                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme;

                // Also update theme-color meta tags immediately so the browser
                // chrome (status bar, bottom nav bar on Android) uses the correct
                // colour from the very first paint — before ThemeManager.js loads.
                var themeColor = theme === 'dark' ? '#1a1a1a' : '#f5f7fa';
                document.querySelectorAll('meta[name="theme-color"]').forEach(function (tag) {
                    tag.removeAttribute('media'); // override OS-preference condition
                    tag.setAttribute('content', themeColor);
                });
                var navColor = document.querySelector('meta[name="msapplication-navbutton-color"]');
                if (navColor) navColor.setAttribute('content', themeColor);
            } catch (_) {
                // If storage is unavailable, keep default theme.
            }
        })();
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
        // Register service worker for PWA functionality
        if ('serviceWorker' in navigator) {
            // Only register service worker on secure origins (HTTPS or localhost) or allow HTTP for development
            const isLocalhost = window.location.hostname === 'localhost' || 
                                window.location.hostname === '127.0.0.1' ||
                                window.location.hostname.startsWith('192.168.') ||  // Local network
                                window.location.hostname.startsWith('10.') ||       // Local network
                                window.location.hostname.endsWith('.local');        // Local network
            
            const isSecureContext = window.location.protocol === 'https:' || isLocalhost;
            
            if (isSecureContext) {
                window.addEventListener('load', () => {
                    // Use relative path to avoid protocol issues
                    const swUrl = '/sw.js';
                    navigator.serviceWorker.register(swUrl)
                        .then(registration => {
                            console.log('Service Worker registered with scope:', registration.scope);
                        })
                        .catch(error => {
                            console.error('Service Worker registration failed:', error);
                        });
                });
            } else {
                console.log('Service Worker not registered: Not a secure context. Use HTTPS or localhost for PWA features.');
            }
        }
    </script>
